<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Factory Tour Vol.01 placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3f3a36"/>
      <stop offset="100%" stop-color="#1f1d1b"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <g font-family="-apple-system, 'Helvetica Neue', 'Hiragino Sans', sans-serif" fill="#f5efe3">
    <text x="80" y="180" font-size="22" letter-spacing="6" opacity="0.65">BETTER BAGS MYANMAR</text>
    <text x="80" y="240" font-size="20" letter-spacing="4" opacity="0.85" fill="#d4a86a">工場シリーズ  Vol.01</text>
    <text x="80" y="330" font-size="56" font-weight="700">ヤンゴン工場の「1 日」</text>
    <text x="80" y="395" font-size="32" opacity="0.85">バーチャル工場見学</text>
    <text x="80" y="550" font-size="20" opacity="0.55">07:30 → 18:00  /  約 600 名の現場</text>
  </g>
  <line x1="80" y1="430" x2="240" y2="430" stroke="#d4a86a" stroke-width="3"/>
